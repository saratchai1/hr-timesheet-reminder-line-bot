name: Monthly Timesheet Reminder

on:
  schedule:
    # Run at 02:00 UTC (09:00 AM BKK time) every day between the 25th and 31st of the month
    - cron: '0 2 25-31 * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI for testing

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Notification Endpoint
        run: |
          echo "Triggering Timesheet Reminder API on Netlify..."
          curl -X POST "${{ secrets.API_URL }}/api/cron/notify-timesheet" \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               -H "Content-Type: application/json"
          echo "Done."
